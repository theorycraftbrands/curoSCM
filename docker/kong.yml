_format_version: "1.1"

consumers:
  - username: anon
    keyauth_credentials:
      - key: ANON_KEY_PLACEHOLDER
  - username: service_role
    keyauth_credentials:
      - key: SERVICE_ROLE_KEY_PLACEHOLDER

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

services:
  # Auth
  - name: auth-v1
    url: http://curoscm-auth:9999/
    routes:
      - name: auth-v1-route
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
          key_names:
            - apikey

  # REST (PostgREST)
  - name: rest-v1
    url: http://curoscm-rest:3000/
    routes:
      - name: rest-v1-route
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
          key_names:
            - apikey

  # Realtime
  - name: realtime-v1
    url: http://curoscm-realtime:4000/socket/
    routes:
      - name: realtime-v1-route
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
          key_names:
            - apikey

  # Storage
  - name: storage-v1
    url: http://curoscm-storage:5000/
    routes:
      - name: storage-v1-route
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
          key_names:
            - apikey

  # Postgres Meta (for Studio)
  - name: meta
    url: http://curoscm-meta:8080/
    routes:
      - name: meta-route
        strip_path: true
        paths:
          - /pg/
    plugins:
      - name: key-auth
        config:
          hide_credentials: false
          key_names:
            - apikey
